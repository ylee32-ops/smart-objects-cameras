<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Smart Classroom Prototype Room Setup</title>
  <desc id="desc">Top-down diagram showing projector, cameras, interactive table, whiteboard, DMX focus beam, phone companion, and calibration tags.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#db2777"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="900" fill="#f8fafc"/>
  <rect x="40" y="40" width="1320" height="820" rx="28" fill="#fff" stroke="#cbd5e1" stroke-width="3" filter="url(#shadow)"/>
  <rect x="60" y="60" width="1280" height="780" rx="18" fill="url(#grid)" opacity=".65"/>

  <!-- Room bounds labels -->
  <text x="80" y="103" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Smart Classroom Prototype Setup</text>
  <text x="82" y="133" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Top-down plan: one room graph, multiple surfaces, cameras, projector, phone companion, and optional DMX focus beam.</text>

  <!-- Whiteboard wall -->
  <rect x="250" y="86" width="840" height="88" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="670" y="138" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#075985">Whiteboard / Projected Board Surface</text>

  <!-- Board calibration tags -->
  <g font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">
    <rect x="262" y="98" width="34" height="34" fill="#0f172a"/>
    <rect x="267" y="103" width="24" height="24" fill="#fff"/>
    <text x="279" y="154" text-anchor="middle" fill="#075985">B0</text>
    <rect x="1044" y="98" width="34" height="34" fill="#0f172a"/>
    <rect x="1049" y="103" width="24" height="24" fill="#fff"/>
    <text x="1061" y="154" text-anchor="middle" fill="#075985">B1</text>
    <rect x="1044" y="128" width="34" height="34" fill="#0f172a"/>
    <rect x="1049" y="133" width="24" height="24" fill="#fff"/>
    <text x="1095" y="154" fill="#075985">B2</text>
    <rect x="262" y="128" width="34" height="34" fill="#0f172a"/>
    <rect x="267" y="133" width="24" height="24" fill="#fff"/>
    <text x="245" y="154" text-anchor="end" fill="#075985">B3</text>
  </g>

  <!-- Projector -->
  <g filter="url(#shadow)">
    <rect x="604" y="760" width="190" height="56" rx="12" fill="#111827"/>
    <circle cx="632" cy="788" r="16" fill="#334155"/>
    <circle cx="632" cy="788" r="8" fill="#94a3b8"/>
    <text x="700" y="794" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#f8fafc">Projector</text>
  </g>
  <path d="M630 760 L250 174 L1090 174 L770 760 Z" fill="#60a5fa" opacity=".09" stroke="#2563eb" stroke-width="2" stroke-dasharray="9 8"/>
  <text x="1090" y="234" font-family="Inter, Arial, sans-serif" font-size="15" fill="#2563eb">Projected board overlay</text>

  <!-- Interactive table -->
  <g filter="url(#shadow)">
    <rect x="415" y="365" width="570" height="245" rx="28" fill="#111827" stroke="#334155" stroke-width="3"/>
    <rect x="445" y="394" width="510" height="187" rx="16" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="700" y="347" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#0f172a">Interactive Table Surface</text>
    <text x="700" y="493" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#f8fafc">Light Lab / Sticky / Clipboard Area</text>
  </g>

  <!-- Table calibration tags -->
  <g font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#f8fafc">
    <rect x="438" y="387" width="36" height="36" fill="#0f172a" stroke="#fff" stroke-width="2"/>
    <path d="M445 394h22v22h-22z" fill="#fff"/>
    <text x="456" y="438" text-anchor="middle" fill="#0f172a">T0</text>
    <rect x="926" y="387" width="36" height="36" fill="#0f172a" stroke="#fff" stroke-width="2"/>
    <path d="M933 394h22v22h-22z" fill="#fff"/>
    <text x="944" y="438" text-anchor="middle" fill="#0f172a">T1</text>
    <rect x="926" y="552" width="36" height="36" fill="#0f172a" stroke="#fff" stroke-width="2"/>
    <path d="M933 559h22v22h-22z" fill="#fff"/>
    <text x="944" y="544" text-anchor="middle" fill="#0f172a">T2</text>
    <rect x="438" y="552" width="36" height="36" fill="#0f172a" stroke="#fff" stroke-width="2"/>
    <path d="M445 559h22v22h-22z" fill="#fff"/>
    <text x="456" y="544" text-anchor="middle" fill="#0f172a">T3</text>
  </g>

  <!-- Tokens on table -->
  <g font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle">
    <rect x="510" y="470" width="84" height="54" rx="10" fill="#3b82f6"/>
    <text x="552" y="502" fill="#fff">Input A</text>
    <rect x="628" y="470" width="84" height="54" rx="10" fill="#22c55e"/>
    <text x="670" y="502" fill="#052e16">Input B</text>
    <rect x="748" y="470" width="84" height="54" rx="10" fill="#93c5fd"/>
    <text x="790" y="502" fill="#082f49">Mirror</text>
    <rect x="866" y="470" width="84" height="54" rx="10" fill="#ec4899"/>
    <text x="908" y="502" fill="#fff">Output</text>
  </g>

  <!-- Overhead camera -->
  <g filter="url(#shadow)">
    <rect x="620" y="220" width="160" height="70" rx="12" fill="#0f172a"/>
    <circle cx="660" cy="255" r="18" fill="#334155"/>
    <circle cx="660" cy="255" r="9" fill="#cbd5e1"/>
    <text x="725" y="262" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#f8fafc">Overhead Cam</text>
  </g>
  <path d="M660 290 L415 610 L985 610 L780 290 Z" fill="#22c55e" opacity=".08" stroke="#16a34a" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="1012" y="582" font-family="Inter, Arial, sans-serif" font-size="15" fill="#15803d">Camera sees table tags + tokens</text>

  <!-- Board camera -->
  <g filter="url(#shadow)">
    <rect x="1080" y="258" width="136" height="58" rx="10" fill="#0f172a"/>
    <circle cx="1112" cy="287" r="15" fill="#334155"/>
    <circle cx="1112" cy="287" r="7" fill="#cbd5e1"/>
    <text x="1162" y="293" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#f8fafc">Board Cam</text>
  </g>
  <path d="M1080 286 L1090 174 L250 174 L1080 316 Z" fill="#38bdf8" opacity=".07" stroke="#0284c7" stroke-width="2" stroke-dasharray="8 8"/>

  <!-- DMX light -->
  <g filter="url(#shadow)">
    <rect x="135" y="250" width="130" height="58" rx="10" fill="#3b0764"/>
    <circle cx="168" cy="279" r="16" fill="#7e22ce"/>
    <text x="218" y="286" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#fff">DMX Beam</text>
  </g>
  <path d="M168 279 C380 210, 575 176, 760 134" fill="none" stroke="#db2777" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowPink)" opacity=".75"/>
  <text x="142" y="336" font-family="Inter, Arial, sans-serif" font-size="15" fill="#9d174d">Optional focus beam</text>

  <!-- Phone companion -->
  <g filter="url(#shadow)">
    <rect x="1115" y="555" width="120" height="210" rx="22" fill="#0f172a"/>
    <rect x="1128" y="586" width="94" height="144" rx="8" fill="#e0f2fe"/>
    <circle cx="1175" cy="746" r="7" fill="#475569"/>
    <text x="1175" y="654" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#075985">Phone</text>
    <text x="1175" y="678" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#075985">Control / AR</text>
  </g>
  <path d="M1115 625 C1010 588, 960 555, 910 524" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>
  <path d="M1125 585 C1035 420, 1005 285, 1020 174" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>
  <text x="1042" y="752" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1d4ed8">Phone selects surfaces/objects</text>

  <!-- Server / room graph -->
  <g filter="url(#shadow)">
    <rect x="132" y="660" width="270" height="120" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="267" y="698" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Room Server</text>
    <text x="267" y="727" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Object graph, event bus, state</text>
    <text x="267" y="752" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Place / Pass / Point / Ask / Reveal / Bind</text>
  </g>

  <!-- Data arrows -->
  <path d="M620 280 C470 340, 390 500, 330 660" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1080 316 C840 490, 520 595, 402 690" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M604 788 C520 780, 455 750, 402 722" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M402 700 C630 650, 790 645, 1115 664" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g font-family="Inter, Arial, sans-serif">
    <rect x="105" y="165" width="122" height="54" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="166" y="188" text-anchor="middle" font-size="13" font-weight="800" fill="#0f172a">Calibration Tags</text>
    <text x="166" y="207" text-anchor="middle" font-size="12" fill="#475569">fixed corners</text>

    <line x1="106" y1="825" x2="166" y2="825" stroke="#16a34a" stroke-width="3" stroke-dasharray="8 8"/>
    <text x="178" y="831" font-size="13" fill="#475569">camera field of view</text>
    <line x1="360" y1="825" x2="420" y2="825" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 8"/>
    <text x="432" y="831" font-size="13" fill="#475569">projection / phone targeting</text>
    <line x1="650" y1="825" x2="710" y2="825" stroke="#db2777" stroke-width="5"/>
    <text x="722" y="831" font-size="13" fill="#475569">focus beam / attention</text>
    <line x1="955" y1="825" x2="1015" y2="825" stroke="#64748b" stroke-width="3"/>
    <text x="1027" y="831" font-size="13" fill="#475569">events to room server</text>
  </g>
</svg>
