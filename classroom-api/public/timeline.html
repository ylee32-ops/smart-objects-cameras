<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Class Calendar &amp; Timeline</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .recur-pop {
      position: fixed;
      top: 80px;
      right: 56px;
      z-index: 30;
      width: 280px;
      padding: 18px;
      border: 1px solid var(--line-hi);
      background: rgba(10, 12, 16, 0.96);
      backdrop-filter: blur(8px);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.55);
      display: none;
    }
    .recur-pop.open { display: grid; gap: 12px; }
    .recur-pop h5 { margin: 0; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--ink-soft); }
    .recur-pop label { display: grid; gap: 4px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
    .recur-pop .actions { display: flex; gap: 8px; margin-top: 6px; }

    .legacy-banner {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 6;
      padding: 8px 14px;
      border: 1px solid var(--line-hi);
      background: rgba(10, 12, 16, 0.86);
      backdrop-filter: blur(8px);
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--green);
    }
    .not-class {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--ink-soft);
      font-family: var(--serif);
      font-style: italic;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: -0.005em;
    }
    /* sits inside the topbar flex flow, between the secondary nav and the
       Log toggle — not absolutely positioned, so it never overlaps. */
    .recurring-edit-link {
      cursor: pointer;
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-soft);
      border-bottom: 1px dashed var(--ink-faint);
      padding-bottom: 2px;
      white-space: nowrap;
    }
    .recurring-edit-link:hover { color: var(--amber); border-color: var(--amber); }
    @media (max-width: 720px) {
      .recurring-edit-link { display: none; }
    }
  </style>
</head>
<body data-page="timeline" class="timeline-stage">
  <header class="topbar">
    <a class="brand" href="/">Smart Classroom</a>
    <nav class="nav nav-primary"></nav>
    <nav class="nav-secondary"></nav>
    <span class="recurring-edit-link" id="recurringEdit" tabindex="0">— —</span>
    <button class="log-toggle" type="button" data-log-toggle>
      <span class="live-dot"></span><span>Log</span><span class="count" data-log-count>0</span>
    </button>
  </header>

  <nav class="subnav" aria-label="Class days">
    <div class="subnav-inner">
      <div class="cal-strip" id="calStrip"></div>
      <div class="daypicker" id="daypicker"></div>
      <div class="cal-strip-controls">
        <button id="prevWeekBtn" aria-label="Previous week">‹</button>
        <button id="todayWeekBtn">Today</button>
        <button id="nextWeekBtn" aria-label="Next week">›</button>
      </div>
    </div>
  </nav>

  <main class="stage-shell" id="stageShell">
    <div style="display: flex; justify-content: center;">
      <button class="daychip" id="daychip" type="button" aria-label="Snap to current cue">
        <span class="date" id="chipDate">—</span>
        <span class="sep"></span>
        <span><span class="key">Phase</span> <strong id="chipPhase" class="am">—</strong></span>
        <span class="sep"></span>
        <span><span class="key">Cue</span> <strong id="chipCue">—</strong></span>
        <span class="sep"></span>
        <span><span class="key">Cues</span> <strong id="chipCueCount">—</strong></span>
      </button>
    </div>

    <div id="lanesShell" style="position: relative;">
      <div id="legacyBanner" class="legacy-banner" hidden>Rehearsed · <span id="legacyEvents">—</span> events</div>
      <div class="not-class" id="notClass" hidden>Not a class day. Pick another, or edit the recurring slot.</div>
    </div>
  </main>

  <div class="transport-bar" id="transportBar">
    <button id="playBtn" class="primary">Play</button>
    <button id="resetBtn">Reset</button>
    <input id="scrubber" type="range" min="0" max="120" step="0.25" value="0" aria-label="Timeline scrubber">
    <label class="emit-toggle"><input id="emitToggle" type="checkbox"> Emit</label>
    <div class="clock-readout"><span id="clockReadout">00:00</span><span class="total" id="clockTotal">/ 00:00</span></div>
  </div>

  <div class="recur-pop" id="recurPop" role="dialog" aria-label="Recurring class slot">
    <h5>Recurring class slot</h5>
    <label>Day of week
      <select id="recurDow">
        <option value="0">Sunday</option><option value="1">Monday</option>
        <option value="2">Tuesday</option><option value="3">Wednesday</option>
        <option value="4">Thursday</option><option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
    </label>
    <label>Start time<input id="recurTime" type="time" value="16:45"></label>
    <label>Duration (hours)<input id="recurHours" type="number" min="0.5" max="6" step="0.5" value="3"></label>
    <div class="actions">
      <button id="recurSave" class="primary">Save</button>
      <button id="recurClose" class="ghost">Close</button>
    </div>
  </div>

  <!-- A hidden h2 keeps the smoke-test marker "Class Timeline" present
       in the static markup even though the page no longer surfaces it. -->
  <h2 style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">Class Timeline</h2>

  <script src="/shared.js"></script>
  <script src="/timeline.js"></script>
  <script src="/calendar.js"></script>
</body>
</html>
