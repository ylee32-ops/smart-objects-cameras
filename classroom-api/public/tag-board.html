<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Mobile Tag Board</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    html,
    body[data-page="tag-board"] {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body[data-page="tag-board"] {
      display: grid;
      grid-template-rows: auto 1fr;
      background: #f8fafc;
      color: #0f172a;
      touch-action: none;
    }
    body[data-page="tag-board"] .topbar {
      position: relative;
      z-index: 12;
      background: #080a0e;
    }
    body[data-page="tag-board"].tag-clean {
      grid-template-rows: 1fr;
    }
    body[data-page="tag-board"].tag-clean .tag-board-titlebar,
    body[data-page="tag-board"].tag-clean .tag-board-mini,
    body[data-page="tag-board"].tag-clean .tag-board-toolbar,
    body[data-page="tag-board"].tag-clean .tag-label,
    body[data-page="tag-board"].tag-clean .tag-board-grid {
      display: none;
    }
    body[data-page="tag-board"].tag-clean .virtual-tag.selected .tag-face {
      outline: none;
    }
    body[data-page="tag-board"].tag-clean .server-focus-label {
      display: none;
    }
    .tag-board-app {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #f8fafc;
    }
    .virtual-board {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #fbfbf5;
      touch-action: none;
      user-select: none;
    }
    .tag-board-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    .tag-effect-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .focus-effect {
      fill: rgba(14, 165, 233, 0.08);
      stroke: rgba(14, 165, 233, 0.72);
      stroke-width: 2;
    }
    .focus-beam {
      fill: rgba(14, 165, 233, 0.12);
      stroke: rgba(14, 165, 233, 0.42);
      stroke-width: 1.5;
    }
    .focus-axis {
      stroke: rgba(15, 23, 42, 0.55);
      stroke-width: 2;
      stroke-dasharray: 7 7;
    }
    .server-focus-effect {
      fill: rgba(251, 146, 60, 0.08);
      stroke: rgba(251, 146, 60, 0.9);
      stroke-width: 3;
    }
    .server-focus-beam {
      fill: rgba(251, 146, 60, 0.16);
      stroke: rgba(251, 146, 60, 0.62);
      stroke-width: 2;
    }
    .server-focus-axis {
      stroke: rgba(180, 83, 9, 0.85);
      stroke-width: 2.4;
      stroke-dasharray: 0;
    }
    .server-focus-label {
      fill: #92400e;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 4;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .virtual-tag-layer {
      position: absolute;
      inset: 0;
      touch-action: none;
      z-index: 2;
    }
    .virtual-tag {
      --tag-size: 132px;
      --tag-rotation: 0deg;
      --tag-color: #e5e7eb;
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--tag-size);
      min-width: 48px;
      transform: translate(-50%, -50%) rotate(var(--tag-rotation));
      transform-origin: 50% 50%;
      touch-action: none;
      cursor: grab;
      z-index: 2;
    }
    .virtual-tag.selected {
      z-index: 4;
    }
    .virtual-tag.dragging {
      cursor: grabbing;
    }
    .tag-face {
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: max(8px, calc(var(--tag-size) * 0.08));
      background: #fff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 3px 12px rgba(15, 23, 42, 0.16);
    }
    .virtual-tag.selected .tag-face {
      outline: 3px solid #0ea5e9;
      outline-offset: 4px;
    }
    .tag-face img {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      pointer-events: none;
    }
    .tag-label {
      position: absolute;
      left: 50%;
      top: calc(100% + 7px);
      transform: translateX(-50%);
      max-width: 180px;
      padding: 4px 7px;
      border-radius: 4px;
      background: rgba(15, 23, 42, 0.88);
      color: #f8fafc;
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.2;
      white-space: nowrap;
      text-align: center;
      pointer-events: none;
    }
    .tag-label::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 5px;
      background: var(--tag-color);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.25);
      vertical-align: 0;
    }
    .tag-board-toolbar {
      position: absolute;
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 8;
      display: grid;
      gap: 9px;
      max-width: 760px;
      margin: 0 auto;
      padding: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 7px;
      background: rgba(8, 10, 14, 0.92);
      color: var(--ink);
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.28);
      backdrop-filter: blur(12px);
    }
    body[data-page="tag-board"].tag-controls-collapsed .tag-board-toolbar {
      display: none;
    }
    .tag-board-mini {
      position: absolute;
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 8;
      display: flex;
      justify-content: center;
      gap: 7px;
      pointer-events: none;
    }
    .tag-board-mini button {
      pointer-events: auto;
      min-height: 34px;
      padding: 6px 11px;
      border-color: rgba(15, 23, 42, 0.18);
      background: rgba(255, 255, 255, 0.78);
      color: #0f172a;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(8px);
    }
    body[data-page="tag-board"]:not(.tag-controls-collapsed) .tag-board-mini {
      display: none;
    }
    .tag-board-toolbar button,
    .tag-board-toolbar select,
    .tag-board-toolbar input {
      min-height: 34px;
    }
    .tag-board-toolbar select,
    .tag-board-toolbar input[type="range"] {
      width: 100%;
      min-width: 0;
    }
    .toolbar-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      align-items: center;
    }
    .toolbar-row.wide {
      grid-template-columns: minmax(0, 1fr) auto;
    }
    .toolbar-row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .toolbar-field {
      display: grid;
      gap: 4px;
      min-width: 0;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .selected-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
    }
    .tag-board-status {
      min-height: 18px;
      color: var(--ink-soft);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.35;
    }
    .clean-exit {
      position: absolute;
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 9;
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 50%;
      border-color: rgba(15, 23, 42, 0.12);
      background: rgba(255, 255, 255, 0.58);
      color: #0f172a;
      display: none;
    }
    body[data-page="tag-board"].tag-clean .clean-exit {
      display: block;
    }
    @media (max-width: 820px) {
      body[data-page="tag-board"] .nav {
        display: none;
      }
      body[data-page="tag-board"] .topbar {
        padding: 8px 10px;
      }
      .tag-board-toolbar {
        gap: 7px;
      }
      .toolbar-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .toolbar-row.wide,
      .selected-controls {
        grid-template-columns: 1fr;
      }
    }
    @media (orientation: landscape) and (max-height: 520px) {
      body[data-page="tag-board"] {
        grid-template-rows: 1fr;
      }
      body[data-page="tag-board"] .tag-board-titlebar,
      body[data-page="tag-board"] .tag-label,
      body[data-page="tag-board"] .tag-board-grid {
        display: none;
      }
      .virtual-board {
        background: #fffef8;
      }
      .tag-board-mini {
        left: auto;
        right: max(8px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        justify-content: flex-end;
      }
      .tag-board-mini button {
        min-height: 30px;
        padding: 5px 8px;
        font-size: 11px;
      }
      .tag-board-toolbar {
        left: auto;
        right: max(8px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        width: min(340px, calc(100vw - 16px));
        max-height: calc(100svh - 16px);
        overflow: auto;
      }
    }
  </style>
</head>
<body data-page="tag-board" class="tag-controls-collapsed">
  <header class="topbar tag-board-titlebar">
    <div class="brand">Mobile Tag Board</div>
    <nav class="nav"></nav>
    <div class="spacer"></div>
    <span class="pill" id="tagBoardCount">0 tags</span>
  </header>

  <main id="tagBoardApp" class="tag-board-app">
    <section id="virtualBoard" class="virtual-board" aria-label="Virtual AprilTag board">
      <div class="tag-board-grid"></div>
      <svg id="tagEffectLayer" class="tag-effect-layer" aria-hidden="true"></svg>
      <div id="virtualTagLayer" class="virtual-tag-layer"></div>
      <button id="showTagControls" class="clean-exit" type="button" aria-label="Show controls">...</button>
    </section>

    <div class="tag-board-mini" aria-label="Tag board quick controls">
      <button id="tagBoardModeToggle" type="button" title="Calibration shows corner tags 4-7 + focus 23. Board hides corners and shows focus only.">Mode: Calibration</button>
      <button id="openTagBoardControls" type="button">Edit</button>
      <button id="freshTagBoard" type="button">Fresh</button>
      <button id="miniCleanTagBoard" type="button">Clean</button>
      <button id="miniFullscreenTagBoard" type="button">Full</button>
    </div>

    <aside id="tagBoardToolbar" class="tag-board-toolbar">
      <div class="toolbar-row wide">
        <label class="toolbar-field">
          Add tag
          <select id="tagBoardPicker"></select>
        </label>
        <button id="addVirtualTag" class="primary" type="button">Add</button>
      </div>

      <div class="toolbar-row">
        <button id="hideTagBoardControls" type="button">Hide</button>
        <button id="freshTagBoardFull" type="button">Fresh</button>
        <button id="cleanTagBoard" type="button">Clean</button>
        <button id="fullscreenTagBoard" type="button">Fullscreen</button>
        <button id="presetCorners" type="button">Board</button>
        <button id="presetTools" type="button">Tools</button>
      </div>

      <div class="selected-controls">
        <label class="toolbar-field">
          Size
          <input id="tagSizeRange" type="range" min="64" max="360" value="132">
        </label>
        <label class="toolbar-field">
          Rotate
          <input id="tagRotationRange" type="range" min="-180" max="180" value="0">
        </label>
      </div>

      <div class="toolbar-row three">
        <button id="duplicateVirtualTag" type="button">Clone</button>
        <button id="deleteVirtualTag" class="warn" type="button">Delete</button>
        <button id="resetVirtualTags" class="warn" type="button">Reset</button>
      </div>

      <div id="tagBoardStatus" class="tag-board-status">Drag tags with one finger. Use two fingers or middle/right drag to rotate.</div>
    </aside>
  </main>

  <script src="/shared.js"></script>
  <script src="/tag-board.js"></script>
</body>
</html>
