<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camera Command Bench</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .camera-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 56px;
      display: grid;
      gap: 14px;
    }
    .camera-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .camera-card {
      border: 1px solid var(--line);
      background: var(--bg-panel);
      border-radius: 3px;
      padding: 14px;
      display: grid;
      gap: 9px;
    }
    .command-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 900px) {
      .camera-grid,
      .command-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="cameras">
  <header class="topbar">
    <div class="brand">Smart Classroom</div>
    <nav class="nav">
      <a href="/start.html">Start</a>
      <a href="/">Console</a>
      <a href="/projects.html">Projects</a>
      <a href="/report.html">Report</a>
      <a href="/cameras.html" class="active">Cameras</a>
      <a href="/events.html">Events</a>
    </nav>
    <div class="spacer"></div>
    <span class="status-dot" data-connection-dot></span>
  </header>

  <main class="camera-shell">
    <section class="hero-line">
      <div class="eyebrow">OAK-D Bridge</div>
      <h1>Camera command bench.</h1>
      <p>Send directed requests to Orbit, Gravity, or Horizon. A camera receives them when its OAK command agent is subscribed as that camera ID.</p>
    </section>

    <section class="panel">
      <h2>Send Command</h2>
      <div class="panel-body stack">
        <div class="command-grid">
          <label class="form-row">
            <span>Camera</span>
            <select id="cameraId">
              <option>orbit</option>
              <option>gravity</option>
              <option>horizon</option>
              <option>all-cameras</option>
            </select>
          </label>
          <label class="form-row">
            <span>Command</span>
            <select id="command">
              <option value="set-mode">set-mode</option>
              <option value="capture">capture</option>
              <option value="fiducial">fiducial</option>
              <option value="request">request</option>
            </select>
          </label>
          <label class="form-row">
            <span>Mode</span>
            <select id="mode">
              <option value="person">person</option>
              <option value="vjepa">vjepa</option>
              <option value="gaze">gaze</option>
              <option value="fatigue">fatigue</option>
              <option value="whiteboard">whiteboard</option>
              <option value="fiducial">fiducial</option>
              <option value="idle">idle</option>
            </select>
          </label>
          <label class="form-row">
            <span>Reason</span>
            <input id="reason" value="manual room command">
          </label>
        </div>
        <div class="row">
          <button id="sendCommandBtn" class="primary">Send Command</button>
          <button id="refreshBtn">Refresh</button>
          <a href="/events.html"><button>Open Events</button></a>
        </div>
        <div id="resultLine" class="small">No command sent yet.</div>
      </div>
    </section>

    <section id="cameraGrid" class="camera-grid"></section>
  </main>

  <script src="/shared.js"></script>
  <script src="/cameras.js"></script>
</body>
</html>
