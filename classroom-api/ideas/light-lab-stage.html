<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Light Lab — Stage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f5efe2;
      --ink-soft: rgba(245, 239, 226, 0.55);
      --ink-faint: rgba(245, 239, 226, 0.18);
      --ink-rule: rgba(245, 239, 226, 0.10);
      --bg: #060709;
      --bg-2: #0b0d10;
      --amber: #ffb360;
      --amber-soft: rgba(255, 179, 96, 0.18);
      --cyan: #6fb9c9;
      --cyan-soft: rgba(111, 185, 201, 0.16);
      --emerald: #6fc090;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1200px 700px at 50% 55%, rgba(255, 179, 96, 0.045), transparent 65%),
        radial-gradient(900px 600px at 12% 8%, rgba(111, 185, 201, 0.04), transparent 60%);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.86  0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      opacity: 0.5;
      mix-blend-mode: screen;
      z-index: 1;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    /* corner registration marks */
    .reg {
      position: fixed;
      width: 18px;
      height: 18px;
      pointer-events: none;
      z-index: 3;
    }
    .reg::before, .reg::after {
      content: "";
      position: absolute;
      background: var(--ink-faint);
    }
    .reg::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
    .reg::after { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }
    .reg.tl { top: 28px; left: 28px; }
    .reg.tr { top: 28px; right: 28px; }
    .reg.bl { bottom: 28px; left: 28px; }
    .reg.br { bottom: 28px; right: 28px; }

    /* margin metadata */
    .meta {
      position: fixed;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      z-index: 4;
      pointer-events: none;
    }
    .meta .sep {
      display: inline-block;
      width: 18px;
      height: 1px;
      background: var(--ink-faint);
      margin: 0 10px;
      vertical-align: middle;
    }
    .meta .key { color: var(--ink-faint); margin-right: 8px; }

    .meta.tl { top: 32px; left: 60px; }
    .meta.tr { top: 32px; right: 60px; text-align: right; }
    .meta.bl { bottom: 32px; left: 60px; }
    .meta.br { bottom: 32px; right: 60px; text-align: right; }

    .meta strong {
      font-weight: 500;
      color: var(--ink);
    }

    /* central instrument plate */
    .plate {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(72vw, 980px);
      aspect-ratio: 16 / 10;
      z-index: 2;
    }

    .plate svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* hairline grid inside the plate */
    .grid line { stroke: rgba(245, 239, 226, 0.05); stroke-width: 0.5; }
    .grid .heavy { stroke: rgba(245, 239, 226, 0.10); }

    /* surface frame */
    .frame {
      stroke: rgba(245, 239, 226, 0.22);
      stroke-width: 0.75;
      fill: none;
    }
    .frame-tick {
      stroke: rgba(245, 239, 226, 0.22);
      stroke-width: 0.75;
    }

    /* tag corner registration */
    .tag-corner {
      stroke: rgba(245, 239, 226, 0.42);
      stroke-width: 0.9;
      fill: none;
    }

    /* objects */
    .obj-glyph {
      stroke: var(--ink);
      stroke-width: 1.1;
      fill: none;
    }
    .obj-fill { fill: var(--bg); stroke: var(--ink); stroke-width: 1.1; }

    /* beam */
    .beam-glow {
      stroke: var(--amber);
      stroke-width: 6;
      fill: none;
      stroke-linecap: round;
      filter: blur(7px);
      opacity: 0.55;
    }
    .beam-core {
      stroke: #fff5dc;
      stroke-width: 1.1;
      fill: none;
      stroke-linecap: round;
      mix-blend-mode: screen;
    }
    .beam-core.draw {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawBeam 2.4s cubic-bezier(.2,.8,.2,1) 0.6s forwards;
    }
    .beam-glow.draw {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawBeam 2.4s cubic-bezier(.2,.8,.2,1) 0.6s forwards;
    }
    @keyframes drawBeam {
      to { stroke-dashoffset: 0; }
    }

    .pulse {
      animation: pulse 4s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.85; }
    }

    .emitter-core {
      fill: #fff7df;
      filter: drop-shadow(0 0 18px rgba(255, 179, 96, 0.85));
    }

    .target-ring { stroke: var(--ink); stroke-width: 0.9; fill: none; opacity: 0.55; }
    .target-engaged .target-ring { stroke: var(--amber); opacity: 1; }
    .target-cross  { stroke: var(--ink); stroke-width: 0.9; opacity: 0.5; }
    .target-engaged .target-cross { stroke: var(--amber); opacity: 1; }

    /* engaged plate */
    .engaged-plate {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.9s ease 1.6s, transform 0.9s ease 1.6s;
    }
    .target-engaged .engaged-plate { opacity: 1; transform: translateY(0); }

    /* labels */
    .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      fill: var(--ink-soft);
    }
    .label-id {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.3em;
      fill: var(--ink-faint);
    }
    .num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      fill: var(--amber);
    }

    .title {
      font-family: 'Fraunces', serif;
      font-optical-sizing: auto;
      font-variation-settings: "opsz" 144;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.04em;
      fill: var(--ink);
    }

    /* title plate */
    .title-block {
      position: absolute;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 3;
    }
    .title-block .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--ink-soft);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .title-block .eyebrow::before,
    .title-block .eyebrow::after {
      content: "";
      width: 32px;
      height: 1px;
      background: var(--ink-faint);
    }
    .title-block h1 {
      margin: 0;
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144;
      font-weight: 300;
      font-size: clamp(28px, 4.2vw, 56px);
      letter-spacing: -0.01em;
      line-height: 1.0;
      color: var(--ink);
    }
    .title-block h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--amber);
    }

    /* idle dial — top right ornamental dial */
    .dial {
      position: fixed;
      top: 60px;
      right: 60px;
      width: 92px;
      height: 92px;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 1.6s ease 0.4s forwards;
    }
    .dial circle { fill: none; stroke: var(--ink-faint); stroke-width: 0.5; }
    .dial .arc { stroke: var(--amber); stroke-width: 0.8; }
    .dial .needle { stroke: var(--ink); stroke-width: 0.8; transform-origin: 50% 50%; animation: spin 28s linear infinite; }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* page enter */
    .stage > * { animation: fadeIn 1.4s ease both; }
    .meta { animation: fadeIn 2s ease 0.2s both; }
    .reg  { animation: fadeIn 2s ease 0.4s both; }

    /* custom cursor */
    .cursor {
      position: fixed;
      pointer-events: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--ink-faint);
      transform: translate(-50%, -50%);
      z-index: 99;
      transition: transform 0.12s ease-out, border-color 0.2s, width 0.2s, height 0.2s;
      mix-blend-mode: difference;
    }
    .cursor::before {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 2px; height: 2px;
      background: var(--ink);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    /* mode pill */
    .mode {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--ink-soft);
      padding: 8px 22px 8px 26px;
      border: 1px solid var(--ink-rule);
      border-radius: 999px;
      z-index: 4;
      backdrop-filter: blur(2px);
    }
    .mode .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      margin-right: 12px;
      vertical-align: middle;
      box-shadow: 0 0 12px rgba(255, 179, 96, 0.7);
      animation: pulse 2s ease-in-out infinite;
    }

    /* scenes navigation (hidden, can show with R key) */
    .helper {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-faint);
      z-index: 4;
      display: flex;
      gap: 28px;
      align-items: center;
    }
    .helper button {
      background: none;
      border: none;
      color: var(--ink-soft);
      font: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      cursor: pointer;
      padding: 6px 0;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
    }
    .helper button:hover { color: var(--ink); border-bottom-color: var(--amber); }
    .helper button.active { color: var(--amber); border-bottom-color: var(--amber); }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>

  <span class="reg tl"></span>
  <span class="reg tr"></span>
  <span class="reg bl"></span>
  <span class="reg br"></span>

  <div class="meta tl">
    <span class="key">Lab</span><strong>Light · 02</strong>
    <span class="sep"></span>
    <span class="key">Surface</span><strong>Table</strong>
  </div>
  <div class="meta tr" id="metaClock">
    <span class="key">T</span><strong id="clock">— —</strong>
    <span class="sep"></span>
    <span class="key">Sess</span><strong>0x4af1·c2</strong>
  </div>
  <div class="meta bl" id="metaState">
    <span class="key">Beam</span><strong id="beamState">routing</strong>
    <span class="sep"></span>
    <span class="key">λ</span><strong id="wavelength">605 nm</strong>
  </div>
  <div class="meta br">
    <span class="key">Cal</span><strong>0.948</strong>
    <span class="sep"></span>
    <span class="key">Tags</span><strong id="tagCount">04 / 06</strong>
  </div>

  <div class="mode"><span class="dot"></span>Place</div>

  <svg class="dial" viewBox="0 0 92 92" aria-hidden="true">
    <circle cx="46" cy="46" r="38"/>
    <circle cx="46" cy="46" r="30"/>
    <path class="arc" d="M 46 8 A 38 38 0 0 1 84 46" fill="none"/>
    <line class="needle" x1="46" y1="46" x2="46" y2="14"/>
    <circle cx="46" cy="46" r="2" fill="var(--amber)"/>
  </svg>

  <main class="stage">

    <div class="plate" id="plate">
      <svg viewBox="0 0 980 612" preserveAspectRatio="xMidYMid meet">
        <!-- grid -->
        <g class="grid">
          <g id="gridLines"></g>
        </g>

        <!-- surface frame with tick marks -->
        <rect class="frame" x="40" y="40" width="900" height="532"/>

        <!-- corner ticks -->
        <g class="frame-tick">
          <line x1="40" y1="20" x2="40" y2="40"/>
          <line x1="20" y1="40" x2="40" y2="40"/>
          <line x1="940" y1="20" x2="940" y2="40"/>
          <line x1="940" y1="40" x2="960" y2="40"/>
          <line x1="40" y1="572" x2="40" y2="592"/>
          <line x1="20" y1="572" x2="40" y2="572"/>
          <line x1="940" y1="572" x2="940" y2="592"/>
          <line x1="940" y1="572" x2="960" y2="572"/>
        </g>

        <!-- tag corner indicators (calibration tags 0-3) -->
        <g class="tag-corner">
          <path d="M 40 40 L 56 40 M 40 40 L 40 56"/>
          <path d="M 940 40 L 924 40 M 940 40 L 940 56"/>
          <path d="M 940 572 L 924 572 M 940 572 L 940 556"/>
          <path d="M 40 572 L 56 572 M 40 572 L 40 556"/>
        </g>
        <g>
          <text class="label-id" x="60" y="34">TAG · 00</text>
          <text class="label-id" x="920" y="34" text-anchor="end">TAG · 01</text>
          <text class="label-id" x="920" y="586" text-anchor="end">TAG · 02</text>
          <text class="label-id" x="60" y="586">TAG · 03</text>
        </g>

        <!-- emitter at (180, 380) -->
        <g id="emitter" transform="translate(180, 380)">
          <circle r="22" class="obj-fill"/>
          <circle r="5" class="emitter-core pulse"/>
          <line x1="0" y1="-26" x2="0" y2="-36" class="frame-tick"/>
          <text class="label" x="0" y="58" text-anchor="middle">Emitter · 10</text>
        </g>

        <!-- mirror at (520, 220), 45deg -->
        <g id="mirror" transform="translate(520, 220) rotate(-45)">
          <line x1="-44" y1="0" x2="44" y2="0" stroke="var(--ink)" stroke-width="2.5"/>
          <line x1="-44" y1="6" x2="44" y2="6" stroke="var(--ink-faint)" stroke-width="0.6"/>
          <circle r="2" fill="var(--ink)"/>
        </g>
        <g transform="translate(520, 220)">
          <text class="label" x="0" y="-60" text-anchor="middle">Mirror · 11</text>
          <text class="label-id" x="0" y="-72" text-anchor="middle">θ 045°</text>
        </g>

        <!-- splitter -->
        <g id="splitter" transform="translate(720, 220) rotate(45)">
          <line x1="-30" y1="0" x2="30" y2="0" stroke="var(--cyan)" stroke-width="1.5" opacity="0.85"/>
          <line x1="-30" y1="-3" x2="30" y2="-3" stroke="var(--cyan)" stroke-width="0.6" opacity="0.4" stroke-dasharray="2 3"/>
        </g>
        <g transform="translate(720, 220)">
          <text class="label" x="0" y="-44" text-anchor="middle">Splitter · 13</text>
        </g>

        <!-- target at (840, 380) -->
        <g id="target" transform="translate(840, 380)">
          <circle r="26" class="target-ring"/>
          <circle r="14" class="target-ring"/>
          <line x1="-30" y1="0" x2="-18" y2="0" class="target-cross"/>
          <line x1="18" y1="0" x2="30" y2="0" class="target-cross"/>
          <line x1="0" y1="-30" x2="0" y2="-18" class="target-cross"/>
          <line x1="0" y1="18" x2="0" y2="30" class="target-cross"/>
          <text class="label" x="0" y="58" text-anchor="middle">Target · 15</text>
        </g>

        <!-- beam: emitter -> mirror -> target, plus splitter branch -->
        <g id="beamGroup">
          <!-- main beam: emitter to mirror to target -->
          <path class="beam-glow draw" d="M 180 380 L 520 220 L 840 380"/>
          <path class="beam-core draw" d="M 180 380 L 520 220 L 840 380"/>

          <!-- splitter branch -->
          <path class="beam-glow draw" d="M 720 220 L 720 380" style="animation-delay:1.6s; opacity: 0.32;"/>
          <path class="beam-core draw" d="M 720 220 L 720 380" style="animation-delay:1.6s;"/>
        </g>

        <!-- beam vertex markers (where mirror reflects) -->
        <g>
          <circle cx="520" cy="220" r="2.5" fill="var(--amber)"/>
          <circle cx="720" cy="220" r="2.5" fill="var(--cyan)"/>
        </g>

        <!-- engaged plate near target -->
        <g class="engaged-plate" id="engagedPlate" transform="translate(840, 460)">
          <line x1="-46" y1="0" x2="46" y2="0" stroke="var(--amber)" stroke-width="0.6"/>
          <text class="label" x="0" y="14" text-anchor="middle" fill="var(--amber)">Engaged</text>
          <text class="num" x="0" y="32" text-anchor="middle">0.948 · 605 nm</text>
        </g>

        <!-- ambient typographic plate, top center, in-frame -->
        <text class="title" x="490" y="62" text-anchor="middle">i.</text>
      </svg>
    </div>

    <div class="title-block">
      <div class="eyebrow">Scene 01 · Place</div>
      <h1>Light bends <em>through</em> the room.</h1>
    </div>

  </main>

  <div class="helper">
    <button class="active" data-scene="solved">Solved</button>
    <button data-scene="routing">Routing</button>
    <button data-scene="lost">Lost mirror</button>
  </div>

  <script>
    // tick clock
    const clockEl = document.getElementById('clock');
    function tick() {
      const d = new Date();
      const pad = n => n.toString().padStart(2, '0');
      clockEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }
    setInterval(tick, 1000); tick();

    // hairline dot grid in the plate
    (function buildGrid() {
      const g = document.getElementById('gridLines');
      const stepX = 60, stepY = 60;
      let s = "";
      for (let x = 40; x <= 940; x += stepX) {
        s += `<line x1="${x}" y1="40" x2="${x}" y2="572" />`;
      }
      for (let y = 40; y <= 572; y += stepY) {
        s += `<line x1="40" y1="${y}" x2="940" y2="${y}" />`;
      }
      g.innerHTML = s;
    })();

    // engage target after beam draws
    setTimeout(() => {
      document.getElementById('target').classList.add('target-engaged');
      document.getElementById('engagedPlate').parentElement.classList.add('target-engaged');
      document.getElementById('beamState').textContent = 'engaged';
    }, 3200);

    // scene switcher
    document.querySelectorAll('.helper button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.helper button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const scene = btn.dataset.scene;
        const target = document.getElementById('target');
        const beamGroup = document.getElementById('beamGroup');
        const beamState = document.getElementById('beamState');
        const mirrorLabel = document.querySelector('#mirror line');

        if (scene === 'solved') {
          target.classList.add('target-engaged');
          beamGroup.style.opacity = 1;
          beamState.textContent = 'engaged';
        } else if (scene === 'routing') {
          target.classList.remove('target-engaged');
          beamGroup.style.opacity = 0.55;
          beamState.textContent = 'routing';
        } else if (scene === 'lost') {
          target.classList.remove('target-engaged');
          beamGroup.style.opacity = 0.18;
          beamState.textContent = 'tag lost · 11';
        }
      });
    });

    // custom cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
